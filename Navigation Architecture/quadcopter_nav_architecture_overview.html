<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadcopter Navigation Architecture</title>
<style>
  body {
    margin: 0;
    padding: 2rem;
    font-family: system-ui, -apple-system, sans-serif;
    background: #f8f7f4;
    display: flex;
    justify-content: center;
  }
  .container {
    max-width: 720px;
    width: 100%;
  }
  svg text { font-family: system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2c2c2a; }
  .ts { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  .leader { stroke: #b4b2a9; stroke-width: 0.5; stroke-dasharray: 4 3; }

  /* Color ramps */
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }

  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }

  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #444441; }
  .c-gray .ts { fill: #5F5E5A; }

  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }
</style>
</head>
<body>
<div class="container">
<svg width="100%" viewBox="0 0 680 520">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="30" text-anchor="middle" style="font-size:16px">Navigation Architecture — Layered Approach</text>

<!-- Layer 1: Global -->
<g class="c-purple">
  <rect x="40" y="55" width="600" height="70" rx="14" stroke-width="0.5"/>
  <text class="th" x="340" y="82" text-anchor="middle">Global path planner</text>
  <text class="ts" x="340" y="102" text-anchor="middle">A* / RRT* — plan full route from start to goal</text>
</g>

<!-- Arrow down -->
<line x1="340" y1="125" x2="340" y2="155" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="143" text-anchor="start">Waypoints</text>

<!-- Layer 2: Local -->
<g class="c-teal">
  <rect x="40" y="155" width="600" height="70" rx="14" stroke-width="0.5"/>
  <text class="th" x="340" y="182" text-anchor="middle">Local path planner</text>
  <text class="ts" x="340" y="202" text-anchor="middle">DWA / APF — react to nearby obstacles</text>
</g>

<!-- Arrow down -->
<line x1="340" y1="225" x2="340" y2="255" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="243" text-anchor="start">Velocity cmds</text>

<!-- Layer 3: Control -->
<g class="c-coral">
  <rect x="40" y="255" width="600" height="70" rx="14" stroke-width="0.5"/>
  <text class="th" x="340" y="282" text-anchor="middle">Flight controller (PID / PX4)</text>
  <text class="ts" x="340" y="302" text-anchor="middle">Attitude + rate control — motor mixing</text>
</g>

<!-- Arrow down -->
<line x1="340" y1="325" x2="340" y2="355" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="355" y="343" text-anchor="start">PWM signals</text>

<!-- Layer 4: Hardware -->
<g class="c-gray">
  <rect x="40" y="355" width="600" height="50" rx="14" stroke-width="0.5"/>
  <text class="th" x="340" y="385" text-anchor="middle">Motors + ESCs + IMU + GPS + LIDAR / depth cam</text>
</g>

<!-- Sensor feedback loop -->
<path d="M640 380 L660 380 L660 90 L640 90" fill="none" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="652" y="240" text-anchor="start" transform="rotate(90, 652, 240)">Sensor feedback</text>

<!-- Future: Object tracking -->
<g class="c-amber">
  <rect x="40" y="440" width="600" height="56" rx="14" stroke-width="0.5"/>
  <text class="th" x="340" y="462" text-anchor="middle">+ Object tracking module (future)</text>
  <text class="ts" x="340" y="480" text-anchor="middle">Feeds dynamic goal updates into local planner</text>
</g>

<line x1="340" y1="405" x2="340" y2="438" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
</svg>
</div>
</body>
</html>
